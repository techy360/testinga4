    <header class="container">
        <h1>Cart Page</h1>
        <p class="breadcrumb">Home / Cart</p>

    <nav class="container nav-links" aria-label="Main navigation">
        <a href="index.html">Home</a>

    <main class="container">
        <section class="card">
            <h2>Your Cart</h2>
            <p>1 x Analytics T-Shirt</p>
            <p class="price">Total: $49.99</p>
            <div class="info-row">

                <a class="button" href="checkout.html" data-begin-checkout data-track-click
                    data-event-name="begin_checkout_click" data-event-category="ecommerce"
                    data-event-label="cart_to_checkout">Proceed to Checkout</a>
            </div>
        </section>
    </main>

    <script src="assets/analytics-events.js"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
