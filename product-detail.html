<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail (PDP) | Analytics Learning Site</title>

            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-P33XB7GB');</script>

    <link rel="stylesheet" href="assets/styles.css">
</head>

<body data-page-name="product_detail">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P33XB7GB" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <header class="container">
        <h1>Product Detail Page (PDP)</h1>
        <p class="breadcrumb">Home / Product List / Product Detail</p>
    </header>

    <nav class="container nav-links" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="product-list.html">Product List</a>
        <a href="product-detail.html">Product Detail (PDP)</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
        <a href="thank-you.html">Thank You</a>
    </nav>

    <main class="container">
        <section class="card">
            <h2 id="pdp-item-name">Analytics T-Shirt</h2>
            <p id="pdp-item-description">Soft cotton t-shirt for analytics engineers.</p>
            <p class="price" id="pdp-item-price">$49.99</p>
            <div class="info-row">
                <button id="pdp-add-to-cart" data-add-to-cart data-track-click data-event-name="add_to_cart_click"
                    data-event-category="ecommerce" data-event-label="pdp_add_to_cart" data-item-id="SKU-001"
                    data-item-name="Analytics T-Shirt" data-price="49.99">Add to Cart</button>
                <a class="button secondary" href="cart.html" data-track-click data-event-name="go_to_cart"
                    data-event-category="navigation" data-event-label="pdp_to_cart">Go to Cart</a>
            </div>
        </section>
    </main>

    <script src="assets/analytics-events.js"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        const params = new URLSearchParams(window.location.search);
        const selectedItem = {
            item_id: params.get('item_id') || 'SKU-001',
            item_name: params.get('item_name') || 'Analytics T-Shirt',
            price: Number(params.get('price') || '49.99'),
            description: params.get('description') || 'Soft cotton t-shirt for analytics engineers.'
        };

        const itemNameElement = document.getElementById('pdp-item-name');
        const itemDescriptionElement = document.getElementById('pdp-item-description');
        const itemPriceElement = document.getElementById('pdp-item-price');
        const addToCartButton = document.getElementById('pdp-add-to-cart');

        itemNameElement.textContent = selectedItem.item_name;
        itemDescriptionElement.textContent = selectedItem.description;
        itemPriceElement.textContent = `$${selectedItem.price.toFixed(2)}`;

        addToCartButton.dataset.itemId = selectedItem.item_id;
        addToCartButton.dataset.itemName = selectedItem.item_name;
        addToCartButton.dataset.price = String(selectedItem.price);

    </script>
</body>

</html>
